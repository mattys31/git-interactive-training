<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitLab — Learn Git Interactively</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #21262d;
  --green:    #39d353;
  --green-dim:#1a6b2a;
  --green-lo: #0d3318;
  --amber:    #f0a50a;
  --amber-dim:#7a5205;
  --blue:     #58a6ff;
  --red:      #f85149;
  --purple:   #bc8cff;
  --text:     #c9d1d9;
  --text-dim: #484f58;
  --border:   #30363d;
  --commit-r: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 44px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  color: var(--green);
  letter-spacing: 0.05em;
}
.topbar-logo span { color: var(--amber); }
.topbar-sep { flex:1; }
.lesson-tabs {
  display: flex;
  gap: 4px;
}
.lesson-tab {
  font-size: 0.65rem;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.15s;
  white-space: nowrap;
}
.lesson-tab:hover { border-color: var(--green-dim); color: var(--text); }
.lesson-tab.active { background: var(--green-lo); border-color: var(--green); color: var(--green); }
.lesson-tab.done { color: var(--green-dim); border-color: var(--green-dim); }
.lesson-tab.done::before { content:'✓ '; }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 1fr 220px;
  flex: 1;
  min-height: 0;
  gap: 0;
}

/* ── GIT GRAPH PANEL ── */
.graph-panel {
  grid-column: 1;
  grid-row: 1;
  background: var(--bg);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.graph-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.7rem;
  color: var(--text-dim);
  flex-shrink: 0;
}
.graph-header strong { color: var(--text); }
.branch-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px 2px 7px;
  font-size: 0.65rem;
  color: var(--purple);
}
.branch-pill::before { content: '⎇'; font-size: 0.8rem; }

.graph-area {
  flex: 1;
  overflow: auto;
  padding: 20px 24px;
  position: relative;
}
.graph-area::-webkit-scrollbar { width: 4px; height: 4px; }
.graph-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#gitGraph {
  min-width: 100%;
  overflow: visible;
}

/* working tree / index area */
.wt-area {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
.wt-box {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
}
.wt-box-title {
  font-size: 0.6rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.file-list { display: flex; flex-direction: column; gap: 3px; min-height: 24px; }
.file-pill {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 3px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
.file-pill.untracked { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }
.file-pill.staged    { background: rgba(57,211,83,0.12);  color: var(--green); border: 1px solid rgba(57,211,83,0.25); }
.file-pill.modified  { background: rgba(240,165,10,0.12); color: var(--amber); border: 1px solid rgba(240,165,10,0.25); }
.file-pill.committed { background: rgba(88,166,255,0.12); color: var(--blue);  border: 1px solid rgba(88,166,255,0.25); }

/* ── LESSON PANEL (right) ── */
.lesson-panel {
  grid-column: 2;
  grid-row: 1 / 3;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.lesson-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 18px;
}
.lesson-content::-webkit-scrollbar { width: 3px; }
.lesson-content::-webkit-scrollbar-thumb { background: var(--border); }

.lesson-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 4px;
}
.lesson-subtitle {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-bottom: 16px;
  line-height: 1.6;
}
.lesson-body {
  font-size: 0.72rem;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 16px;
}
.lesson-body code {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  color: var(--amber);
  font-family: 'JetBrains Mono', monospace;
}
.lesson-body strong { color: var(--green); }

.task-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
.task-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--amber);
  margin-bottom: 8px;
}
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 0.68rem;
  margin-bottom: 6px;
  line-height: 1.5;
  color: var(--text-dim);
  transition: color 0.3s;
}
.task-item.done { color: var(--green); }
.task-item.done .task-check { background: var(--green); border-color: var(--green); color: #000; }
.task-check {
  width: 14px; height: 14px;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 0.55rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.2s;
}

.hint-box {
  background: rgba(88,166,255,0.07);
  border: 1px solid rgba(88,166,255,0.2);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 0.65rem;
  line-height: 1.7;
  color: var(--blue);
  margin-bottom: 12px;
}
.hint-box strong { color: var(--blue); display: block; margin-bottom: 4px; }

.next-btn {
  width: 100%;
  background: var(--green-lo);
  border: 1px solid var(--green);
  color: var(--green);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}
.next-btn:hover { background: var(--green); color: #000; }
.next-btn.visible { display: block; animation: fadeIn 0.4s; }

.concept-tag {
  display: inline-block;
  background: rgba(188,140,255,0.1);
  border: 1px solid rgba(188,140,255,0.3);
  color: var(--purple);
  font-size: 0.58rem;
  padding: 2px 8px;
  border-radius: 20px;
  margin: 0 3px 6px 0;
}

/* ── TERMINAL ── */
.terminal {
  grid-column: 1;
  grid-row: 2;
  background: #0a0c0e;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
}
.term-titlebar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.term-dot { width:10px; height:10px; border-radius:50%; }
.term-dot.r { background:#ff5f57; }
.term-dot.y { background:#febc2e; }
.term-dot.g { background:#28c840; }
.term-cwd {
  margin-left: 8px;
  font-size: 0.62rem;
  color: var(--text-dim);
}
.term-cwd span { color: var(--amber); }

.term-output {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-size: 0.72rem;
  line-height: 1.65;
}
.term-output::-webkit-scrollbar { width: 3px; }
.term-output::-webkit-scrollbar-thumb { background: #30363d; }

.term-line { display: flex; gap: 0; }
.term-prompt { color: var(--green); white-space: pre; flex-shrink:0; }
.term-cmd    { color: var(--text); }
.term-out    { color: var(--text-dim); white-space: pre-wrap; }
.term-out.success { color: var(--green); }
.term-out.error   { color: var(--red); }
.term-out.info    { color: var(--blue); }
.term-out.warn    { color: var(--amber); }

.term-input-row {
  display: flex;
  align-items: center;
  padding: 6px 14px 10px;
  gap: 0;
  flex-shrink: 0;
}
.term-input-prompt { color: var(--green); white-space: pre; flex-shrink:0; font-size:0.72rem; }
.term-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  caret-color: var(--green);
}

/* scanline effect */
.terminal::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
}
.terminal { position: relative; }

/* ── GIT GRAPH SVG nodes ── */
.commit-node circle {
  stroke-width: 2;
  transition: all 0.4s;
}
.commit-node text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  fill: var(--text);
}
.commit-node .hash { fill: var(--text-dim); font-size: 9px; }
.branch-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
}
.edge { stroke-width: 2; fill: none; }

.pulse-ring {
  fill: none;
  stroke-width: 1.5;
  animation: pulse 1.5s ease-out infinite;
}
@keyframes pulse {
  0%   { r: 14; opacity: 0.8; }
  100% { r: 24; opacity: 0; }
}

/* progress bar */
.progress-bar {
  height: 2px;
  background: var(--border);
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  transition: width 0.4s ease;
}

/* success flash */
@keyframes successFlash {
  0%   { background: rgba(57,211,83,0.12); }
  100% { background: transparent; }
}
.flash { animation: successFlash 0.6s ease-out; }

/* celebration */
.celebrate {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: var(--bg2);
  border: 1px solid var(--green);
  border-radius: 12px;
  padding: 28px 40px;
  text-align: center;
  z-index: 999;
  display: none;
  animation: fadeIn 0.4s;
}
.celebrate.show { display: block; }
.celebrate h2 { font-family:'Syne',sans-serif; color:var(--green); margin-bottom:8px; }
.celebrate p  { color: var(--text-dim); font-size:0.75rem; line-height:1.7; }
.celebrate button {
  margin-top:16px;
  background: var(--green);
  border: none;
  color: #000;
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;
  padding:8px 20px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">git<span>lab</span>.learn</div>
  <div class="topbar-sep"></div>
  <div class="lesson-tabs" id="lessonTabs"></div>
</div>

<div class="layout">

  <!-- GIT GRAPH -->
  <div class="graph-panel">
    <div class="graph-header">
      <strong>Repository</strong>
      <span style="flex:1"></span>
      <span id="currentBranchPill" class="branch-pill">main</span>
      <span style="color:var(--text-dim);font-size:0.62rem" id="commitCount">0 commits</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="graph-area" id="graphArea">
      <svg id="gitGraph" height="120" width="600"></svg>
    </div>
    <div class="wt-area">
      <div class="wt-box">
        <div class="wt-box-title">📁 Working Directory</div>
        <div class="file-list" id="wtFiles"></div>
      </div>
      <div class="wt-box">
        <div class="wt-box-title">📋 Staging Area (Index)</div>
        <div class="file-list" id="stageFiles"></div>
      </div>
      <div class="wt-box">
        <div class="wt-box-title">🗃️ Last Commit</div>
        <div class="file-list" id="commitFiles"></div>
      </div>
    </div>
  </div>

  <!-- LESSON PANEL -->
  <div class="lesson-panel">
    <div class="lesson-content" id="lessonContent"></div>
  </div>

  <!-- TERMINAL -->
  <div class="terminal">
    <div class="term-titlebar">
      <div class="term-dot r"></div>
      <div class="term-dot y"></div>
      <div class="term-dot g"></div>
      <div class="term-cwd">bash — <span id="cwdLabel">~/projects</span></div>
    </div>
    <div class="term-output" id="termOutput"></div>
    <div class="term-input-row">
      <span class="term-input-prompt" id="termPrompt">user@gitlab:~/projects$ </span>
      <input class="term-input" id="termInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type a git command...">
    </div>
  </div>

</div>

<div class="celebrate" id="celebrate">
  <h2>🎉 Level Complete!</h2>
  <p id="celebrateText"></p>
  <button onclick="nextLesson()">Next Lesson →</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const state = {
  initialized: false,
  branch: 'main',
  commits: [],          // { hash, msg, branch, parent, x, y }
  branches: { main: null },  // branchName -> commit hash (HEAD)
  HEAD: null,
  workingFiles: [],     // { name, status: 'untracked'|'modified' }
  stagedFiles: [],      // { name }
  history: [],
  histIdx: -1,
};

let currentLesson = 0;
let completedLessons = new Set();

// ═══════════════════════════════════════════════════════
//  LESSONS
// ═══════════════════════════════════════════════════════
const LESSONS = [
  {
    id: 0,
    title: '01 — git init',
    subtitle: 'Creating a new repository',
    concepts: ['repository', 'init'],
    body: `Every Git project starts with a <strong>repository</strong> — a hidden folder called <code>.git</code> that tracks all your changes over time.\n\nThe command <code>git init</code> creates a new repository in the current directory. You only run this once per project.`,
    hint: `Try typing: <code>git init</code>`,
    tasks: [
      { text: 'Run git init to create a repository', cmd: ['git init'], id: 'init' }
    ],
    setup: () => {
      state.initialized = false;
      state.commits = [];
      state.branches = { main: null };
      state.HEAD = null;
      state.branch = 'main';
      state.workingFiles = [];
      state.stagedFiles = [];
      termPrint('Welcome! You\'re in ~/projects. There\'s no git repo yet.', 'info');
      termPrint('Your goal: initialize a git repository.', 'warn');
      updateCwd('~/projects');
    },
  },
  {
    id: 1,
    title: '02 — git status',
    subtitle: 'Seeing what\'s changed',
    concepts: ['status', 'working tree', 'untracked'],
    body: `<code>git status</code> shows you the <strong>current state</strong> of your working directory and staging area.\n\nIt tells you:\n• Which files are <strong style="color:var(--red)">untracked</strong> (new files Git doesn't know about)\n• Which files are <strong style="color:var(--amber)">modified</strong> (changed but not staged)\n• Which files are <strong style="color:var(--green)">staged</strong> (ready to commit)`,
    hint: `First create a file with <code>touch app.js</code>, then run <code>git status</code>`,
    tasks: [
      { text: 'Create a file using touch app.js', cmd: ['touch app.js'], id: 'touch' },
      { text: 'Run git status to see it listed', cmd: ['git status'], id: 'status' },
    ],
    setup: () => {
      termPrint('Repository ready. Try creating some files!', 'info');
    },
  },
  {
    id: 2,
    title: '03 — git add',
    subtitle: 'Staging changes',
    concepts: ['staging area', 'index', 'add'],
    body: `Git has a two-step process for saving changes:\n\n<strong>Step 1:</strong> <code>git add</code> moves changes to the <strong>staging area</strong> (also called the index). Think of it like placing items in a box before sealing it.\n\n<strong>Step 2:</strong> <code>git commit</code> seals the box and saves it permanently.\n\nYou can stage specific files: <code>git add app.js</code>\nOr stage everything: <code>git add .</code>`,
    hint: `Run <code>git add app.js</code> to stage the file, then check with <code>git status</code>`,
    tasks: [
      { text: 'Stage app.js with git add app.js', cmd: ['git add app.js', 'git add .'], id: 'add' },
      { text: 'Run git status to confirm it\'s staged', cmd: ['git status'], id: 'status2' },
    ],
    setup: () => {
      if (!state.workingFiles.find(f => f.name === 'app.js')) {
        state.workingFiles.push({ name: 'app.js', status: 'untracked' });
      }
      updateFileVisualization();
      termPrint('app.js is in your working directory but not staged yet.', 'warn');
    },
  },
  {
    id: 3,
    title: '04 — git commit',
    subtitle: 'Saving a snapshot',
    concepts: ['commit', 'snapshot', 'hash'],
    body: `A <strong>commit</strong> is a permanent snapshot of your staged changes. Every commit gets a unique ID called a <strong>hash</strong> (like <code style="color:var(--amber)">a3f8c2d</code>).\n\nCommits require a message explaining what changed:\n<code>git commit -m "your message here"</code>\n\nGood commit messages are short, specific, and use present tense: <em>"Add login button"</em>, <em>"Fix crash on startup"</em>.`,
    hint: `Make sure app.js is staged, then run: <code>git commit -m "Add app.js"</code>`,
    tasks: [
      { text: 'Commit with a descriptive message', cmd: ['git commit'], id: 'commit' },
    ],
    setup: () => {
      if (!state.workingFiles.find(f => f.name === 'app.js') && !state.stagedFiles.find(f => f.name === 'app.js')) {
        state.workingFiles.push({ name: 'app.js', status: 'untracked' });
      }
      updateFileVisualization();
      termPrint('Stage your files, then make your first commit!', 'info');
    },
  },
  {
    id: 4,
    title: '05 — git log',
    subtitle: 'Viewing history',
    concepts: ['log', 'history', 'HEAD'],
    body: `<code>git log</code> shows the commit history — a list of every commit ever made on this branch.\n\nEach entry shows:\n• The commit <strong>hash</strong> (unique ID)\n• <strong>Author</strong> and date\n• The commit <strong>message</strong>\n\n<strong>HEAD</strong> is a special pointer that always points to your current position in history — usually the latest commit on your branch.`,
    hint: `Make a couple of commits first, then run <code>git log</code>`,
    tasks: [
      { text: 'Make at least 2 commits total', cmd: ['git commit'], id: 'twocommits' },
      { text: 'Run git log to see history', cmd: ['git log'], id: 'log' },
    ],
    setup: () => {
      termPrint('Try: touch index.html → git add . → git commit -m "Add index"', 'info');
      termPrint('Then run git log to see your history.', 'info');
    },
  },
  {
    id: 5,
    title: '06 — git branch',
    subtitle: 'Parallel timelines',
    concepts: ['branch', 'pointer', 'diverge'],
    body: `A <strong>branch</strong> is an independent line of development — like a parallel universe for your code.\n\nCreate a new branch:\n<code>git branch feature-login</code>\n\nSwitch to it:\n<code>git checkout feature-login</code>\n\nOr do both at once:\n<code>git checkout -b feature-login</code>\n\nBranches are cheap and fast — use them for every new feature or bug fix!`,
    hint: `Run <code>git checkout -b feature</code> to create and switch to a new branch`,
    tasks: [
      { text: 'Create a new branch with git branch or checkout -b', cmd: ['git branch', 'git checkout'], id: 'branch' },
      { text: 'Switch to the new branch', cmd: ['git checkout'], id: 'switch' },
      { text: 'Make a commit on the new branch', cmd: ['git commit'], id: 'branchcommit' },
    ],
    setup: () => {
      termPrint('You\'re on main. Create a new branch to work on a feature!', 'info');
    },
  },
  {
    id: 6,
    title: '07 — git merge',
    subtitle: 'Combining branches',
    concepts: ['merge', 'fast-forward', 'merge commit'],
    body: `<code>git merge</code> combines changes from one branch into another.\n\nTo merge your feature branch into main:\n<code>git checkout main</code>\n<code>git merge feature</code>\n\nA <strong>fast-forward</strong> merge happens when there's a straight line of commits — Git just moves the pointer forward.\n\nA <strong>merge commit</strong> is created when branches have diverged.`,
    hint: `Switch back to main with <code>git checkout main</code>, then run <code>git merge feature</code>`,
    tasks: [
      { text: 'Switch back to main branch', cmd: ['git checkout main'], id: 'tomain' },
      { text: 'Merge the feature branch', cmd: ['git merge'], id: 'merge' },
    ],
    setup: () => {
      termPrint('Make sure you have commits on a feature branch, then merge!', 'info');
    },
  },
];

// ═══════════════════════════════════════════════════════
//  TASK TRACKING
// ═══════════════════════════════════════════════════════
let taskDone = {};

function checkTask(cmdRoot) {
  const lesson = LESSONS[currentLesson];
  lesson.tasks.forEach(task => {
    if (!taskDone[task.id]) {
      const matches = task.cmd.some(c => cmdRoot.startsWith(c.split(' ')[0] + ' ') || cmdRoot === c);
      if (matches) {
        // More specific checking
        if (task.id === 'init'        && cmdRoot === 'git init') taskDone[task.id] = true;
        if (task.id === 'touch'       && cmdRoot.startsWith('touch')) taskDone[task.id] = true;
        if (task.id === 'status'      && cmdRoot === 'git status') taskDone[task.id] = true;
        if (task.id === 'status2'     && cmdRoot === 'git status') taskDone[task.id] = true;
        if (task.id === 'add'         && (cmdRoot.startsWith('git add'))) taskDone[task.id] = true;
        if (task.id === 'commit'      && cmdRoot.startsWith('git commit')) taskDone[task.id] = true;
        if (task.id === 'twocommits'  && cmdRoot.startsWith('git commit') && state.commits.length >= 2) taskDone[task.id] = true;
        if (task.id === 'log'         && cmdRoot === 'git log') taskDone[task.id] = true;
        if (task.id === 'branch'      && (cmdRoot.startsWith('git branch') || cmdRoot.startsWith('git checkout -b') || cmdRoot.startsWith('git checkout'))) {
          if (Object.keys(state.branches).length > 1) taskDone[task.id] = true;
        }
        if (task.id === 'switch'      && cmdRoot.startsWith('git checkout') && state.branch !== 'main') taskDone[task.id] = true;
        if (task.id === 'branchcommit'&& cmdRoot.startsWith('git commit') && state.branch !== 'main') taskDone[task.id] = true;
        if (task.id === 'tomain'      && cmdRoot === 'git checkout main') taskDone[task.id] = true;
        if (task.id === 'merge'       && cmdRoot.startsWith('git merge')) taskDone[task.id] = true;
      }
    }
  });
  renderLesson();

  const allDone = lesson.tasks.every(t => taskDone[t.id]);
  if (allDone) {
    setTimeout(() => {
      completedLessons.add(currentLesson);
      renderTabs();
      showCelebrate();
    }, 500);
  }
}

// ═══════════════════════════════════════════════════════
//  COMMAND PROCESSOR
// ═══════════════════════════════════════════════════════
function runCommand(raw) {
  const input = raw.trim();
  if (!input) return;

  // history
  state.history.unshift(input);
  state.histIdx = -1;

  // echo command
  appendTermLine(getPrompt(), input, '');

  const parts = input.split(/\s+/);
  const cmd = parts[0];
  const sub = parts[1];
  const rest = parts.slice(2).join(' ');

  if (cmd === 'clear') { document.getElementById('termOutput').innerHTML = ''; return; }
  if (cmd === 'help')  { showHelp(); return; }
  if (cmd === 'ls')    { cmdLs(); checkTask(input); return; }
  if (cmd === 'pwd')   { termPrint(state.initialized ? '~/projects/my-repo' : '~/projects', 'out'); return; }
  if (cmd === 'touch') { cmdTouch(parts.slice(1)); checkTask(input); return; }
  if (cmd === 'echo')  { cmdEcho(parts.slice(1)); checkTask(input); return; }

  if (cmd !== 'git') {
    termPrint(`command not found: ${cmd}`, 'error');
    termPrint(`Try: git init, git status, git add, git commit, git log, git branch, git checkout, git merge`, 'info');
    return;
  }

  switch (sub) {
    case 'init':    cmdGitInit(); break;
    case 'status':  cmdGitStatus(); break;
    case 'add':     cmdGitAdd(parts.slice(2)); break;
    case 'commit':  cmdGitCommit(parts); break;
    case 'log':     cmdGitLog(); break;
    case 'branch':  cmdGitBranch(parts.slice(2)); break;
    case 'checkout':cmdGitCheckout(parts.slice(2)); break;
    case 'merge':   cmdGitMerge(parts.slice(2)); break;
    case 'diff':    cmdGitDiff(); break;
    case 'reset':   termPrint('git reset: be careful with this one! (not in scope of this lesson)', 'warn'); break;
    default:
      termPrint(`git: '${sub}' is not a recognized command.`, 'error');
      termPrint(`Available: init, status, add, commit, log, branch, checkout, merge`, 'info');
  }

  checkTask(input);
  updateFileVisualization();
  renderGraph();
}

// ─── git init ───
function cmdGitInit() {
  if (state.initialized) {
    termPrint('Reinitialized existing Git repository in .git/', 'warn');
    return;
  }
  state.initialized = true;
  updateCwd('~/projects/my-repo');
  termPrint('Initialized empty Git repository in ~/projects/my-repo/.git/', 'success');
  termPrint('', 'out');
  termPrint('  A hidden .git/ folder was created. Git will now track', 'info');
  termPrint('  all changes in this directory.', 'info');
}

// ─── git status ───
function cmdGitStatus() {
  if (!state.initialized) { notInit(); return; }
  termPrint(`On branch ${state.branch}`, 'out');
  if (state.commits.length === 0) termPrint('No commits yet', 'warn');
  else termPrint('', 'out');

  if (state.stagedFiles.length > 0) {
    termPrint('Changes to be committed:', 'success');
    termPrint('  (use "git restore --staged <file>" to unstage)', 'out');
    state.stagedFiles.forEach(f => termPrint(`        new file:   ${f.name}`, 'success'));
    termPrint('', 'out');
  }

  const untracked = state.workingFiles.filter(f => f.status === 'untracked');
  const modified  = state.workingFiles.filter(f => f.status === 'modified');

  if (modified.length > 0) {
    termPrint('Changes not staged for commit:', 'warn');
    modified.forEach(f => termPrint(`        modified:   ${f.name}`, 'warn'));
    termPrint('', 'out');
  }

  if (untracked.length > 0) {
    termPrint('Untracked files:', 'error');
    termPrint('  (use "git add <file>" to include in what will be committed)', 'out');
    untracked.forEach(f => termPrint(`        ${f.name}`, 'error'));
    termPrint('', 'out');
  }

  if (state.stagedFiles.length === 0 && state.workingFiles.length === 0) {
    termPrint('nothing to commit, working tree clean', 'out');
  }
}

// ─── git add ───
function cmdGitAdd(args) {
  if (!state.initialized) { notInit(); return; }
  if (args.length === 0) { termPrint('usage: git add <file> or git add .', 'error'); return; }

  let toStage = [];
  if (args[0] === '.') {
    toStage = [...state.workingFiles];
    state.workingFiles = [];
  } else {
    args.forEach(name => {
      const idx = state.workingFiles.findIndex(f => f.name === name);
      if (idx !== -1) {
        toStage.push(state.workingFiles[idx]);
        state.workingFiles.splice(idx, 1);
      } else {
        termPrint(`error: pathspec '${name}' did not match any files`, 'error');
      }
    });
  }

  toStage.forEach(f => {
    if (!state.stagedFiles.find(s => s.name === f.name)) {
      state.stagedFiles.push({ name: f.name });
      termPrint(`  staged: ${f.name}`, 'success');
    }
  });
  if (toStage.length > 0) termPrint('✓ Files moved to staging area', 'success');
}

// ─── git commit ───
function cmdGitCommit(parts) {
  if (!state.initialized) { notInit(); return; }
  if (state.stagedFiles.length === 0) {
    termPrint('nothing to commit, working tree clean', 'warn');
    termPrint('Hint: use git add <file> to stage changes first', 'info');
    return;
  }

  // parse message
  let msg = '';
  const mFlag = parts.indexOf('-m');
  if (mFlag !== -1) {
    msg = parts.slice(mFlag + 1).join(' ').replace(/^["']|["']$/g, '');
  }
  if (!msg) {
    msg = `Update ${state.stagedFiles.map(f => f.name).join(', ')}`;
  }

  const hash = Math.random().toString(36).slice(2,9);
  const parent = state.HEAD;
  const commit = {
    hash,
    short: hash.slice(0,7),
    msg,
    branch: state.branch,
    parent,
    files: state.stagedFiles.map(f => f.name),
  };

  state.commits.push(commit);
  state.branches[state.branch] = hash;
  state.HEAD = hash;
  state.stagedFiles = [];

  termPrint(`[${state.branch} ${hash.slice(0,7)}] ${msg}`, 'success');
  termPrint(`  ${commit.files.length} file(s) changed`, 'out');
  termPrint('', 'out');
  termPrint('  📦 Snapshot saved! This commit is now permanent.', 'info');
  updateCwd();
  document.getElementById('commitCount').textContent = `${state.commits.length} commit${state.commits.length!==1?'s':''}`;
}

// ─── git log ───
function cmdGitLog() {
  if (!state.initialized) { notInit(); return; }
  if (state.commits.length === 0) {
    termPrint('fatal: your current branch has no commits yet', 'error');
    return;
  }
  // walk commit chain
  const chain = [];
  let cur = state.HEAD;
  const seen = new Set();
  while (cur && !seen.has(cur)) {
    seen.add(cur);
    const c = state.commits.find(c => c.hash === cur);
    if (!c) break;
    chain.push(c);
    cur = c.parent;
  }
  chain.forEach(c => {
    termPrint(`commit ${c.hash}`, 'warn');
    termPrint(`Date:   just now`, 'out');
    termPrint(``, 'out');
    termPrint(`    ${c.msg}`, 'out');
    termPrint(``, 'out');
  });
  termPrint(`── ${chain.length} commit(s) on ${state.branch} ──`, 'info');
}

// ─── git branch ───
function cmdGitBranch(args) {
  if (!state.initialized) { notInit(); return; }
  if (args.length === 0) {
    Object.keys(state.branches).forEach(b => {
      termPrint((b === state.branch ? '* ' : '  ') + b, b === state.branch ? 'success' : 'out');
    });
    return;
  }
  const name = args[0];
  if (state.branches[name] !== undefined) {
    termPrint(`fatal: A branch named '${name}' already exists.`, 'error');
    return;
  }
  state.branches[name] = state.HEAD;
  termPrint(`Created branch '${name}'`, 'success');
  termPrint(`Tip: use 'git checkout ${name}' to switch to it`, 'info');
}

// ─── git checkout ───
function cmdGitCheckout(args) {
  if (!state.initialized) { notInit(); return; }
  const newB = args[0] === '-b';
  const name = newB ? args[1] : args[0];

  if (!name) { termPrint('usage: git checkout <branch> or git checkout -b <new-branch>', 'error'); return; }

  if (newB) {
    if (state.branches[name] !== undefined) {
      termPrint(`fatal: A branch named '${name}' already exists.`, 'error');
      return;
    }
    state.branches[name] = state.HEAD;
    state.branch = name;
    termPrint(`Switched to a new branch '${name}'`, 'success');
    termPrint(`  ↳ This branch starts at the same commit as where you were.`, 'info');
  } else {
    if (state.branches[name] === undefined) {
      termPrint(`error: pathspec '${name}' did not match any branch.`, 'error');
      termPrint(`Available branches: ${Object.keys(state.branches).join(', ')}`, 'info');
      return;
    }
    state.branch = name;
    state.HEAD = state.branches[name];
    termPrint(`Switched to branch '${name}'`, 'success');
  }
  document.getElementById('currentBranchPill').textContent = state.branch;
  updateCwd();
}

// ─── git merge ───
function cmdGitMerge(args) {
  if (!state.initialized) { notInit(); return; }
  const from = args[0];
  if (!from) { termPrint('usage: git merge <branch>', 'error'); return; }
  if (state.branches[from] === undefined) {
    termPrint(`merge: ${from} - not something we can merge`, 'error');
    return;
  }
  if (from === state.branch) {
    termPrint('Already up to date.', 'out');
    return;
  }

  const fromHash = state.branches[from];
  const fromCommit = state.commits.find(c => c.hash === fromHash);

  // Create merge commit
  const hash = Math.random().toString(36).slice(2,9);
  const merge = {
    hash,
    short: hash.slice(0,7),
    msg: `Merge branch '${from}' into ${state.branch}`,
    branch: state.branch,
    parent: state.HEAD,
    parent2: fromHash,
    files: fromCommit ? fromCommit.files : [],
    isMerge: true,
  };
  state.commits.push(merge);
  state.branches[state.branch] = hash;
  state.HEAD = hash;

  termPrint(`Merging '${from}' into '${state.branch}'...`, 'info');
  termPrint(`Merge made by the 'ort' strategy.`, 'success');
  termPrint(`[${state.branch} ${hash.slice(0,7)}] ${merge.msg}`, 'success');
  document.getElementById('commitCount').textContent = `${state.commits.length} commits`;
}

// ─── git diff ───
function cmdGitDiff() {
  if (state.workingFiles.length === 0) {
    termPrint('no changes to show', 'out');
  } else {
    termPrint('diff --git a/... b/...', 'out');
    state.workingFiles.forEach(f => {
      termPrint(`--- a/${f.name}`, 'error');
      termPrint(`+++ b/${f.name}`, 'success');
      termPrint(`@@ -0,0 +1 @@`, 'out');
      termPrint(`+ (some new content)`, 'success');
    });
  }
}

// ─── touch ───
function cmdTouch(args) {
  if (!state.initialized) { termPrint('Tip: initialize a repo first with git init', 'warn'); }
  args.forEach(name => {
    if (!name) return;
    if (!state.workingFiles.find(f => f.name === name) && !state.stagedFiles.find(f => f.name === name)) {
      state.workingFiles.push({ name, status: 'untracked' });
      termPrint(`created: ${name}`, 'success');
    } else {
      termPrint(`touched: ${name}`, 'out');
    }
  });
}

// ─── echo (simulate editing) ───
function cmdEcho(args) {
  const redirectIdx = args.indexOf('>');
  if (redirectIdx !== -1 && args[redirectIdx+1]) {
    const fname = args[redirectIdx+1];
    if (!state.workingFiles.find(f => f.name === fname)) {
      state.workingFiles.push({ name: fname, status: 'untracked' });
    } else {
      const f = state.workingFiles.find(f => f.name === fname);
      if (f) f.status = 'modified';
    }
    termPrint(`wrote to ${fname}`, 'success');
  } else {
    termPrint(args.join(' '), 'out');
  }
}

// ─── ls ───
function cmdLs() {
  if (!state.initialized) {
    termPrint('(empty directory)', 'out');
    return;
  }
  termPrint('.git/', 'info');
  const allFiles = [
    ...state.workingFiles.map(f => f.name),
    ...state.stagedFiles.map(f => f.name),
    ...state.commits.flatMap(c => c.files || []),
  ];
  [...new Set(allFiles)].forEach(f => termPrint(f, 'out'));
}

function notInit() { termPrint('fatal: not a git repository (or any of the parent directories): .git', 'error'); }

function showHelp() {
  termPrint('Available commands:', 'info');
  termPrint('  git init              — create a repository', 'out');
  termPrint('  git status            — show working tree status', 'out');
  termPrint('  git add <file>        — stage a file (or git add .)', 'out');
  termPrint('  git commit -m "msg"   — commit staged changes', 'out');
  termPrint('  git log               — show commit history', 'out');
  termPrint('  git branch <name>     — create a branch', 'out');
  termPrint('  git checkout <name>   — switch branches', 'out');
  termPrint('  git checkout -b <name>— create + switch', 'out');
  termPrint('  git merge <branch>    — merge a branch', 'out');
  termPrint('  touch <file>          — create a file', 'out');
  termPrint('  ls / pwd / clear      — shell utilities', 'out');
}

// ═══════════════════════════════════════════════════════
//  TERMINAL UI
// ═══════════════════════════════════════════════════════
function getPrompt() {
  const cwd = state.initialized ? `my-repo` : `projects`;
  const branch = state.initialized ? ` (${state.branch})` : '';
  return `user@gitlab:~/${cwd}${branch}$ `;
}

function appendTermLine(prompt, cmd, cls) {
  const out = document.getElementById('termOutput');
  const line = document.createElement('div');
  line.className = 'term-line';
  line.innerHTML = `<span class="term-prompt">${escHtml(prompt)}</span><span class="term-cmd">${escHtml(cmd)}</span>`;
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
}

function termPrint(text, type) {
  const out = document.getElementById('termOutput');
  const div = document.createElement('div');
  div.className = `term-out ${type}`;
  div.textContent = text;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateCwd(path) {
  const cwd = path || (state.initialized ? '~/projects/my-repo' : '~/projects');
  document.getElementById('cwdLabel').textContent = cwd;
  const b = state.initialized ? ` (${state.branch})` : '';
  document.getElementById('termPrompt').textContent = `user@gitlab:${cwd}${b}$ `;
}

// ═══════════════════════════════════════════════════════
//  GIT GRAPH VISUALIZATION
// ═══════════════════════════════════════════════════════
const BRANCH_COLORS = {
  main:    '#58a6ff',
  master:  '#58a6ff',
  feature: '#bc8cff',
  develop: '#39d353',
  hotfix:  '#f85149',
};
function branchColor(b) {
  if (BRANCH_COLORS[b]) return BRANCH_COLORS[b];
  const colors = ['#f0a50a','#39d353','#bc8cff','#58a6ff','#f85149'];
  let h = 0; for (let c of b) h = (h*31 + c.charCodeAt(0)) & 0xffff;
  return colors[h % colors.length];
}

function renderGraph() {
  const svg = document.getElementById('gitGraph');
  svg.innerHTML = '';

  if (state.commits.length === 0) {
    // empty state
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', 20); text.setAttribute('y', 40);
    text.setAttribute('fill', '#484f58'); text.setAttribute('font-family', 'JetBrains Mono,monospace');
    text.setAttribute('font-size', '11');
    text.textContent = state.initialized ? 'No commits yet. Stage files and commit!' : 'Run git init to start tracking.';
    svg.appendChild(text);
    svg.setAttribute('height', 80);
    return;
  }

  // Layout: assign x positions per branch, y positions chronologically
  const branchOrder = [];
  const branchX = {};
  state.commits.forEach(c => {
    if (!branchX[c.branch]) {
      branchOrder.push(c.branch);
      branchX[c.branch] = 30 + branchOrder.indexOf(c.branch) * 120;
    }
  });

  const CX = 40, CY = 30, GAPX = 120, GAPY = 70;

  state.commits.forEach((c, i) => {
    c._x = branchX[c.branch] || CX;
    c._y = CY + i * GAPY;
  });

  const totalH = Math.max(120, state.commits.length * GAPY + 60);
  const totalW = Math.max(500, branchOrder.length * GAPX + 200);
  svg.setAttribute('height', totalH);
  svg.setAttribute('width', totalW);

  // Draw edges
  state.commits.forEach(c => {
    if (c.parent) {
      const p = state.commits.find(x => x.hash === c.parent);
      if (p) drawEdge(svg, p._x, p._y, c._x, c._y, branchColor(c.branch));
    }
    if (c.parent2) {
      const p2 = state.commits.find(x => x.hash === c.parent2);
      if (p2) drawEdge(svg, p2._x, p2._y, c._x, c._y, branchColor(c.branch), true);
    }
  });

  // Draw nodes
  state.commits.forEach((c, i) => {
    const isHead = c.hash === state.HEAD;
    const col = branchColor(c.branch);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('commit-node');
    g.style.animation = `fadeIn 0.4s ease-out ${i * 0.05}s both`;

    if (isHead) {
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring.classList.add('pulse-ring');
      ring.setAttribute('cx', c._x); ring.setAttribute('cy', c._y);
      ring.setAttribute('r', 14); ring.setAttribute('stroke', col);
      g.appendChild(ring);
    }

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', c._x); circle.setAttribute('cy', c._y);
    circle.setAttribute('r', c.isMerge ? 10 : 8);
    circle.setAttribute('fill', isHead ? col : '#161b22');
    circle.setAttribute('stroke', col);
    g.appendChild(circle);

    if (c.isMerge) {
      const star = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      star.setAttribute('x', c._x); star.setAttribute('y', c._y + 4);
      star.setAttribute('text-anchor', 'middle');
      star.setAttribute('fill', col); star.setAttribute('font-size', '10');
      star.textContent = '⊕';
      g.appendChild(star);
    }

    // hash label
    const hashT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    hashT.classList.add('hash');
    hashT.setAttribute('x', c._x + 14); hashT.setAttribute('y', c._y - 6);
    hashT.setAttribute('font-family', 'JetBrains Mono,monospace');
    hashT.setAttribute('font-size', '9');
    hashT.setAttribute('fill', '#484f58');
    hashT.textContent = c.short;
    g.appendChild(hashT);

    // message label
    const msgT = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    msgT.setAttribute('x', c._x + 14); msgT.setAttribute('y', c._y + 8);
    msgT.setAttribute('font-family', 'JetBrains Mono,monospace');
    msgT.setAttribute('font-size', '10');
    msgT.setAttribute('fill', '#c9d1d9');
    const shortMsg = c.msg.length > 30 ? c.msg.slice(0,30)+'…' : c.msg;
    msgT.textContent = shortMsg;
    g.appendChild(msgT);

    svg.appendChild(g);
  });

  // Branch labels
  branchOrder.forEach(b => {
    const tip = state.commits.slice().reverse().find(c => c.branch === b && !c.isMerge);
    if (!tip) return;
    const x = branchX[b];
    const y = tip._y;
    const active = b === state.branch;
    const col = branchColor(b);

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x - 28); rect.setAttribute('y', y - 36);
    rect.setAttribute('width', b.length * 7 + 12); rect.setAttribute('height', 16);
    rect.setAttribute('rx', 8); rect.setAttribute('fill', active ? col : '#21262d');
    rect.setAttribute('stroke', col); rect.setAttribute('stroke-width', '1');
    svg.appendChild(rect);

    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.classList.add('branch-label');
    lbl.setAttribute('x', x - 22); lbl.setAttribute('y', y - 24);
    lbl.setAttribute('font-family', 'JetBrains Mono,monospace');
    lbl.setAttribute('font-size', '9');
    lbl.setAttribute('fill', active ? '#000' : col);
    lbl.textContent = (active ? '⎇ ' : '') + b;
    svg.appendChild(lbl);
  });

  // HEAD label
  if (state.HEAD) {
    const hc = state.commits.find(c => c.hash === state.HEAD);
    if (hc) {
      const hl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      hl.setAttribute('x', hc._x - 14); hl.setAttribute('y', hc._y + 4);
      hl.setAttribute('text-anchor', 'end');
      hl.setAttribute('font-family', 'JetBrains Mono,monospace');
      hl.setAttribute('font-size', '9');
      hl.setAttribute('fill', '#f0a50a');
      hl.textContent = 'HEAD';
      svg.appendChild(hl);
    }
  }

  // scroll to bottom
  const area = document.getElementById('graphArea');
  area.scrollTop = area.scrollHeight;
}

function drawEdge(svg, x1,y1,x2,y2, color, dashed) {
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const d = x1===x2
    ? `M ${x1} ${y1} L ${x2} ${y2}`
    : `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`;
  path.setAttribute('d', d);
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '2');
  path.setAttribute('fill', 'none');
  path.setAttribute('opacity', '0.6');
  if (dashed) path.setAttribute('stroke-dasharray', '4 3');
  svg.appendChild(path);
}

// ═══════════════════════════════════════════════════════
//  FILE VISUALIZATION
// ═══════════════════════════════════════════════════════
function updateFileVisualization() {
  const wtEl = document.getElementById('wtFiles');
  const stEl = document.getElementById('stageFiles');
  const cmEl = document.getElementById('commitFiles');

  wtEl.innerHTML = '';
  stEl.innerHTML = '';
  cmEl.innerHTML = '';

  state.workingFiles.forEach(f => {
    wtEl.appendChild(filePill(f.name, f.status));
  });

  state.stagedFiles.forEach(f => {
    stEl.appendChild(filePill(f.name, 'staged'));
  });

  if (state.HEAD) {
    const last = state.commits.find(c => c.hash === state.HEAD);
    if (last && last.files) {
      last.files.forEach(name => cmEl.appendChild(filePill(name, 'committed')));
    }
  }
}

function filePill(name, status) {
  const d = document.createElement('div');
  d.className = `file-pill ${status}`;
  const icons = { untracked:'?', staged:'✓', modified:'M', committed:'●' };
  d.innerHTML = `<span>${icons[status]||'·'}</span> ${name}`;
  return d;
}

// ═══════════════════════════════════════════════════════
//  LESSON RENDERING
// ═══════════════════════════════════════════════════════
function renderLesson() {
  const lesson = LESSONS[currentLesson];
  const done = lesson.tasks.every(t => taskDone[t.id]);
  const progress = ((currentLesson + (done ? 1 : 0)) / LESSONS.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  const content = document.getElementById('lessonContent');
  content.innerHTML = `
    <div class="lesson-title">${lesson.title}</div>
    <div class="lesson-subtitle">${lesson.subtitle}</div>
    <div style="margin-bottom:12px">
      ${lesson.concepts.map(c => `<span class="concept-tag">${c}</span>`).join('')}
    </div>
    <div class="lesson-body">${lesson.body.replace(/\n/g,'<br>')}</div>
    <div class="task-box">
      <div class="task-label">✦ Your Tasks</div>
      ${lesson.tasks.map(t => `
        <div class="task-item ${taskDone[t.id]?'done':''}">
          <div class="task-check">${taskDone[t.id]?'✓':''}</div>
          <span>${t.text}</span>
        </div>
      `).join('')}
    </div>
    <div class="hint-box">
      <strong>💡 Hint</strong>
      ${lesson.hint}
    </div>
    <button class="next-btn ${done&&currentLesson<LESSONS.length-1?'visible':''}" onclick="nextLesson()">
      Next: ${LESSONS[currentLesson+1]?.title || 'Done!'} →
    </button>
  `;
}

function renderTabs() {
  const tabs = document.getElementById('lessonTabs');
  tabs.innerHTML = '';
  LESSONS.forEach((l,i) => {
    const btn = document.createElement('button');
    btn.className = 'lesson-tab' + (i===currentLesson?' active':'') + (completedLessons.has(i)&&i!==currentLesson?' done':'');
    btn.textContent = l.title;
    btn.onclick = () => loadLesson(i);
    tabs.appendChild(btn);
  });
}

function loadLesson(idx) {
  currentLesson = idx;
  taskDone = {};
  const lesson = LESSONS[idx];
  lesson.setup();
  renderLesson();
  renderTabs();
  updateFileVisualization();
  renderGraph();
  document.getElementById('currentBranchPill').textContent = state.branch;
  document.getElementById('termOutput').innerHTML = '';
}

function nextLesson() {
  document.getElementById('celebrate').classList.remove('show');
  if (currentLesson < LESSONS.length - 1) {
    loadLesson(currentLesson + 1);
  }
}

function showCelebrate() {
  const lesson = LESSONS[currentLesson];
  document.getElementById('celebrateText').textContent = `You completed "${lesson.title}" — ${lesson.subtitle}!`;
  document.getElementById('celebrate').classList.add('show');
  setTimeout(() => document.getElementById('celebrate').classList.remove('show'), 4000);
}

// ═══════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════
const input = document.getElementById('termInput');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    runCommand(val);
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (state.histIdx < state.history.length - 1) {
      state.histIdx++;
      input.value = state.history[state.histIdx];
    }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (state.histIdx > 0) {
      state.histIdx--;
      input.value = state.history[state.histIdx];
    } else {
      state.histIdx = -1;
      input.value = '';
    }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    // Simple autocomplete
    const v = input.value;
    const cmds = ['git init','git status','git add .','git add ','git commit -m "','git log','git branch ','git checkout ','git checkout -b ','git merge ','touch ','ls','clear','help'];
    const match = cmds.find(c => c.startsWith(v) && c !== v);
    if (match) input.value = match;
  }
});

// Click anywhere on terminal to focus
document.querySelector('.terminal').addEventListener('click', () => input.focus());

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
loadLesson(0);
input.focus();

  termPrint('Welcome to GitLab.learn! 🌿', 'success');
  termPrint('Type "help" to see all commands, or follow the lesson on the right.', 'info');
  termPrint('Use ↑↓ arrow keys to navigate command history. Tab to autocomplete.', 'info');
  termPrint('', 'out');
}, 100);
</script>
